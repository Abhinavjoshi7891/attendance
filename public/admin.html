<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Dashboard - Riselab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-light: #f8fafc;
            --surface-light: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #1e3a8a;
            /* Academic Deep Blue */
            --accent-hover: #1e40af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Header Navigation style */
        .header {
            width: 100%;
            background: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            border-bottom: 4px solid var(--accent);
        }

        .header-logos {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .header-title {
            text-align: center;
            font-weight: 700;
            font-size: 1.8rem;
            color: var(--text-dark);
            max-width: 900px;
            line-height: 1.4;
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 0 1rem;
            margin-bottom: 3rem;
        }

        .panel {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--bg-light);
        }

        .panel-header h2 {
            font-size: 1.5rem;
            color: var(--accent);
        }

        .btn-export {
            background: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-export:hover {
            background: var(--accent-hover);
        }

        /* Table Styles */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: var(--bg-light);
            color: var(--text-muted);
            font-weight: 600;
            padding: 12px 16px;
            border-bottom: 2px solid var(--border);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f1f5f9;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>

<body>

    <!-- Header Section -->
    <header class="header">
        <div class="header-logos">
            <img src="/logos/iitd-logo.png" alt="IIT Delhi Logo" style="height: 100px;">
            <img src="/logos/University-of-Exeter-logo.webp" alt="University of Exeter Logo"
                style="height: 75px; margin: 0 30px;">
            <img src="/logos/sai-logo.jpg" alt="Sports Authority of India Logo" style="height: 100px;">
        </div>
        <div class="header-title">
            Welcome to the Spring School in Sports Technology, Machine Learning and Data Analytics
        </div>
    </header>

    <div class="container">
        <div class="panel">
            <div class="panel-header">
                <h2>Attendance Records</h2>
                <a href="/api/export" class="btn-export">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m0 0l-4-4m4 4l4-4M4 20h16" />
                    </svg>
                    Download CSV
                </a>
            </div>

            <table id="attendance-table">
                <thead>
                    <tr>
                        <th style="width: 80px;">ID</th>
                        <th>Name</th>
                        <th style="width: 250px;">Timestamp</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Data injected here -->
                </tbody>
            </table>

            <div id="empty-state" class="empty-state" style="display: none;">
                No attendance records found yet. Get people to scan the QR code!
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('/api/attendance');
                const result = await res.json();

                const tbody = document.getElementById('table-body');
                const emptyState = document.getElementById('empty-state');
                const table = document.getElementById('attendance-table');

                if (result.success && result.data && result.data.length > 0) {
                    emptyState.style.display = 'none';
                    table.style.display = 'table';

                    let rowsHtml = '';
                    result.data.forEach(record => {
                        // The server now sends 'local_time' instead of raw UTC timestamp
                        const dateObj = new Date(record.local_time || record.timestamp);

                        // Format nicely: March 1, 2026 - 02:30 PM
                        const formattedTime = dateObj.toLocaleDateString('en-US', {
                            month: 'short',
                            day: 'numeric',
                            year: 'numeric'
                        }) + ' - ' + dateObj.toLocaleTimeString('en-US', {
                            hour: '2-digit',
                            minute: '2-digit',
                            second: '2-digit'
                        });

                        rowsHtml += `
                            <tr>
                                <td>#${record.id}</td>
                                <td><strong>${record.name}</strong></td>
                                <td>${formattedTime}</td>
                            </tr>
                        `;
                    });

                    tbody.innerHTML = rowsHtml;
                } else {
                    emptyState.style.display = 'block';
                    table.style.display = 'none';
                }
            } catch (err) {
                console.error("Error fetching data:", err);
            }
        }

        // Load data on page load
        loadData();

        // Auto-refresh the table every 5 seconds so you can watch it live!
        setInterval(loadData, 5000);
    </script>
</body>

</html>
